---
name: Continuous Delivery
on:
  workflow_call:
    inputs:
      terraform_action:
        description: 'Terraform Action to perform'
        default: 'apply'
        type: string
      name:
        description: 'Environment Details'
        type: string
        default: ''
      display_name:
        description: 'Environment Display Name'
        type: string
        default: ''
      runner_name:
        description: 'Runner Name'
        type: string
        default: ''
      environment_name_plan:
        description: 'Environment Name Plan'
        type: string
        default: ''
      environment_name_apply:
        description: 'Environment Name Apply'
        type: string
        default: ''
      dependent_environment:
        description: 'Dependent Environment'
        type: string
        default: ''
      backend_azure_storage_account_container_name:
        description: 'Backend Azure Storage Account Container Name'
        type: string
        default: ''
      root_module_folder_relative_path:
        description: 'Root Module Folder Relative Path'
        default: '.'
        type: string
      terraform_cli_version:
        description: 'Terraform CLI Version'
        default: 'latest'
        type: string

jobs:
  plan:
    name: Plan with Terraform
    runs-on:
      ${{ inputs.runner_name }}
    concurrency: ${{ inputs.backend_azure_storage_account_container_name }}
    environment: ${{ inputs.environment_name_plan }}
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: "${{ vars.AZURE_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ vars.AZURE_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ vars.AZURE_TENANT_ID }}"
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_versions }}

      - name: Debug Network
        shell: bash
        run: |
          echo "=== DNS resolution ==="
          nslookup stonhs24iacuks001tjp.blob.core.windows.net || true
          echo "=== TCP connectivity ==="
          timeout 5 bash -c 'echo > /dev/tcp/stonhs24iacuks001tjp.blob.core.windows.net/443' && echo "TCP:443 open" || echo "TCP:443 failed"

      - name: Terraform Init
        shell: bash
        run: |
          terraform \
            -chdir="${{ inputs.root_module_folder_relative_path }}" \
            init \
            -backend-config="storage_account_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Plan for ${{ inputs.terraform_action == 'destroy' && 'Destroy' || 'Apply' }}
        shell: bash
        run: |
          additional_variables='${{ vars.ADDITIONAL_ENVIRONMENT_VARIABLES }}'
          if [ -n "$additional_variables" ]; then
            for key in $(echo "$additional_variables" | jq -r 'keys[]'); do
              if [[ "$key" == TF_VAR_* ]]; then
                value=$(echo "$additional_variables" | jq -r --arg k "$key" '.[$k]')
                echo "Setting: $key=$value"
                export "$key=$value"
              fi
            done
          fi

          ARGS=("-chdir=${{ inputs.root_module_folder_relative_path }}" "plan" "-out=tfplan" "-input=false")

          var_file_path="${{ vars.VAR_FILE_PATH }}"
          if [ -n "$var_file_path" ]; then
            ARGS+=("-var-file=$var_file_path")
          fi

          if [ "${{ inputs.terraform_action }}" = "destroy" ]; then
            ARGS+=("-destroy")
          fi

          echo "Running: terraform ${ARGS[*]}"
          terraform "${ARGS[@]}"

      - name: Create Module Artifact
        shell: bash
        run: |
          staging_dir="staging"
          mkdir -p "$staging_dir"
          rsync -a \
            --exclude='.git' \
            --exclude='.terraform' \
            --exclude='.github' \
            --exclude="$staging_dir" \
            ./ "./$staging_dir/"

          tf_dir="./$staging_dir/${{ inputs.root_module_folder_relative_path }}/.terraform"
          if [ -d "$tf_dir" ]; then
            rm -rf "$tf_dir"
          fi

      - name: Publish Module Artifact
        uses: actions/upload-artifact@v4
        with:
          name: module_${{ inputs.name }}
          path: ./staging/

      - name: Show the Plan for Review
        shell: bash
        run: |
          terraform \
            -chdir="${{ inputs.root_module_folder_relative_path }}" \
            show \
            tfplan

  apply:
    name: Apply with Terraform
    needs: plan
    runs-on:
      ${{ inputs.runner_name }}
    concurrency: ${{ inputs.backend_azure_storage_account_container_name }}
    environment: ${{ inputs.environment_name_apply }}
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: "${{ vars.AZURE_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ vars.AZURE_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ vars.AZURE_TENANT_ID }}"
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
      AZAPI_RETRY_GET_AFTER_PUT_MAX_TIME: "60m"      

    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: module_${{ inputs.name }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.terraform_cli_versions }}

      - name: Terraform Init
        shell: bash
        run: |
          terraform \
            -chdir="${{ inputs.root_module_folder_relative_path }}" \
            init \
            -backend-config="storage_account_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform ${{ inputs.terraform_action == 'destroy' && 'Destroy' || 'Apply' }}
        shell: bash
        run: |
          terraform \
            -chdir="${{ inputs.root_module_folder_relative_path }}" \
            apply \
            -input=false \
            -auto-approve \
            tfplan
